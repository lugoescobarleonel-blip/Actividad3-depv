<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Tareas CI/CD</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>🚀 Gestor de Tareas (CI/CD con Jenkins)</h1>
        <p>Versión actualizada automáticamente</p>
    </header>

    <main>
        <section class="formulario">
            <h2>Agregar tarea</h2>
            <input type="text" id="tareaInput" placeholder="Escribe una tarea...">
            <button onclick="agregarTarea()">Agregar</button>
        </section>

        <section class="lista">
            <h2>Lista de tareas</h2>
            <ul id="listaTareas"></ul>
        </section>
    </main>

    <footer>
        <p> Gabo estuvo aca y es super guapo (eso dijo leo)🔥</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
